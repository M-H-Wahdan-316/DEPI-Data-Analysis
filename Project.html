<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manufacturing Line Productivity Report</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background:#0f172a;
            color:white;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 20px;
        }

        .container{
            width:100%;
            max-width:1400px;
        }

        .header{
            margin-bottom:20px;
        }

        .header h1{
            font-size:2rem;
            margin-bottom:10px;
        }

        .header p{
            color:#cbd5e1;
            line-height:1.6;
        }

        .report-wrapper{
            position:relative;
            width:100%;
            padding-top:56.25%;
            border-radius:18px;
            overflow:hidden;
            box-shadow:
                0 10px 30px rgba(0,0,0,0.35),
                0 0 0 1px rgba(255,255,255,0.05);
            background:#111827;
        }

        .report-wrapper iframe{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            border:none;
        }

        .footer{
            margin-top:18px;
            color:#94a3b8;
            font-size:0.95rem;
        }

        @media (max-width:768px){
            .header h1{
                font-size:1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>Manufacturing Line Productivity Dashboard</h1>

            <p>
                Interactive Power BI report for monitoring manufacturing
                performance, productivity metrics, operational KPIs,
                and production insights.
            </p>
        </div>

        <div class="report-wrapper">
            <iframe
                title="Manufacturing Line Productivity Report"
                src="https://app.fabric.microsoft.com/reportEmbed?reportId=207a75f6-d0df-4ca0-a7b0-dfa003b0cdfa&autoAuth=true&ctid=0bc92751-071a-4e2c-a48b-633206fef374"
                allowfullscreen="true">
            </iframe>
        </div>

        <div class="footer">
            Built with Power BI & Microsoft Fabric
        </div>

    </div>

</body>
</html>
